version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: swarmaudit-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - ENVIRONMENT=development
    volumes:
      - /tmp/reports:/tmp/reports
      - /tmp/swarmaudit_repos:/tmp/swarmaudit_repos
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: swarmaudit-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# Frontend runs separately: cd frontend && npm run dev
# It connects to http://localhost:8000 (backend) or http://localhost:80 (nginx)
