name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint
        working-directory: frontend
        run: npm run lint || true   # Don't fail build on lint warnings

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://placeholder.onrender.com
          NEXT_PUBLIC_WS_URL:  wss://placeholder.onrender.com
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

  docker-build-and-push:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/swarmaudit-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/swarmaudit-frontend:sha-${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://swarm-audit.onrender.com
            NEXT_PUBLIC_WS_URL=wss://swarm-audit.onrender.com

  deploy-vercel:
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'

  # ── Alternative: Netlify deploy (uncomment to use instead of Vercel) ────────
