events {
  worker_connections 1024;
}

http {
  # WebSocket connection upgrade support
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 80;
    server_name _;

    # API routes → backend
    location /api/ {
      proxy_pass              http://backend:8000;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 60s;
      proxy_read_timeout    300s;   # Long timeout for audit scans
      proxy_send_timeout    300s;
    }

    # WebSocket → backend (CRITICAL for live streaming)
    location /ws/ {
      proxy_pass              http://backend:8000;
      proxy_http_version      1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400s;  # Keep WebSocket alive for full audit duration
    }

    # Health check pass-through
    location /health {
      proxy_pass http://backend:8000/health;
    }

    # PDF report download
    location /api/report/ {
      proxy_pass              http://backend:8000;
      proxy_set_header Host              $host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_read_timeout    60s;
    }

    # Frontend local dev (Next.js dev server on host port 3000)
    location / {
      proxy_pass              http://host.docker.internal:3000;
      proxy_set_header Host              $host;
      proxy_http_version      1.1;
      proxy_set_header Upgrade    $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header X-Real-IP         $remote_addr;
    }
  }
}
